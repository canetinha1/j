<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Humano X Capivara (Game HTML)</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a33;
      --text: #e7ecff;
      --muted: #aab3d6;
      --btn: #2a4cff;
      --btn2: #3a4a7a;
      --danger: #e23b3b;
      --ok: #2ecc71;
      --border: rgba(255,255,255,0.12);
      --frame: rgba(255, 255, 255, 0.14);
      --greek-red: #8b0000;
      --greek-gold: #d6b25e;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 800px at 20% 0%, rgba(42,76,255,0.25), transparent), var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 18px;
    }
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
    header h1 {
      font-size: 18px;
      margin: 0;
      font-weight: 700;
    }
    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 14px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    .panel {
      background: rgba(18,26,51,0.7);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      position: relative;
      overflow: hidden;
    }

    /* “grego antigo” no frame */
    .panel::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 16px;
      pointer-events: none;
      border: 2px solid rgba(139, 0, 0, 0.22);
      filter: drop-shadow(0 0 10px rgba(139, 0, 0, 0.15));
    }

    .panel::after {
      content: "";
      position: absolute;
      top: 10px;
      left: 10px;
      width: 60px;
      height: 30px;
      border-radius: 10px;
      background: radial-gradient(circle at 30% 30%, rgba(214,178,94,0.35), transparent 60%);
      pointer-events: none;
    }

    pre {

      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.15;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      min-height: 340px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--btn2);
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 700;
      transition: transform 0.05s ease, background 0.15s ease;
      user-select: none;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .primary { background: var(--btn); }
    .danger { background: rgba(226, 59, 59, 0.9); border-color: rgba(226,59,59,0.35); }

    .meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-content: start;
    }

    .badge {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
    }
    .badge .label { color: var(--muted); font-size: 13px; }
    .badge .value { font-weight: 800; }

    .foot {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Humano X Capivara — versão HTML</h1>
      <div class="hint">Use os botões para escolher ataques</div>
    </header>

    <div class="grid">
      <section class="panel">
        <pre id="log"></pre>
        <div class="row" id="actions"></div>
        <div class="foot">Dica: abra no navegador e mantenha a aba aberta durante a partida.</div>
      </section>

      <aside class="panel meta">
        <div class="badge"><div class="label">Nível</div><div class="value" id="level">1</div></div>
        <div class="badge"><div class="label">Vida (Você)</div><div class="value" id="hpPlayer">100</div></div>
        <div class="badge"><div class="label">Vida (Capivara)</div><div class="value" id="hpEnemy">100</div></div>
        <div class="badge"><div class="label">Status</div><div class="value" id="status">Aguardando</div></div>
      </aside>
    </div>
  </div>

  <script src="./game.js"></script>
</body>
</html>
